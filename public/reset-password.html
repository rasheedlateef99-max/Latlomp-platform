<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — LatLomp Platform</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:var(--dark);">

  <div style="width:100%; max-width:460px;">

    <!-- LOGO -->
    <div style="text-align:center; margin-bottom:32px;">
      <a href="index.html" style="display:inline-flex; align-items:center; gap:8px; text-decoration:none;">
        <span style="font-size:28px;">⚡</span>
        <span style="font-size:22px; font-weight:800; color:var(--text-primary);">LatLomp</span>
        <span style="background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:6px; text-transform:uppercase;">Platform</span>
      </a>
    </div>

    <!-- CARD -->
    <div style="background:var(--dark-2); border:1px solid var(--border); border-radius:20px; padding:40px;">

      <!-- LOADING -->
      <div id="stateLoading" style="text-align:center;">
        <div style="width:40px; height:40px; border:4px solid rgba(108,99,255,0.2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px;"></div>
        <p style="color:var(--text-secondary); font-size:14px;">Checking reset link...</p>
      </div>

      <!-- FORM STATE (shown after token validated) -->
      <div id="stateForm" style="display:none;">
        <div style="text-align:center; margin-bottom:28px;">
          <div style="font-size:44px; margin-bottom:12px;">🔑</div>
          <h1 style="font-size:24px; font-weight:800; margin-bottom:6px;">Set New Password</h1>
          <p style="font-size:14px; color:var(--text-secondary);">Choose a strong password for your account.</p>
        </div>

        <div id="formError"
          style="display:none; background:rgba(255,101,132,0.1); border:1px solid rgba(255,101,132,0.3); color:var(--secondary); padding:12px 16px; border-radius:8px; font-size:14px; margin-bottom:16px;">
        </div>

        <!-- New Password -->
        <div style="margin-bottom:16px;">
          <label style="display:block; font-size:12px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px;">
            New Password *
          </label>
          <div class="pw-field-wrap">
            <input id="newPw" type="password" placeholder="Enter new password (min. 6 chars)"
              style="width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:12px 16px; color:var(--text-primary); font-size:15px; font-family:inherit; outline:none; box-sizing:border-box;" />
            <button type="button" class="pw-eye" onclick="togglePw('newPw', this)" tabindex="-1">👁</button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div style="margin-bottom:28px;">
          <label style="display:block; font-size:12px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px;">
            Confirm Password *
          </label>
          <div class="pw-field-wrap">
            <input id="confirmPw" type="password" placeholder="Repeat new password"
              style="width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:12px 16px; color:var(--text-primary); font-size:15px; font-family:inherit; outline:none; box-sizing:border-box;"
              onkeydown="if(event.key==='Enter') submitReset()" />
            <button type="button" class="pw-eye" onclick="togglePw('confirmPw', this)" tabindex="-1">👁</button>
          </div>
        </div>

        <button onclick="submitReset()" id="resetBtn"
          style="width:100%; padding:14px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s;">
          Reset Password →
        </button>
      </div>

      <!-- SUCCESS STATE -->
      <div id="stateSuccess" style="display:none; text-align:center;">
        <div style="font-size:64px; margin-bottom:16px;">✅</div>
        <h2 style="font-size:24px; font-weight:800; color:#43e97b; margin-bottom:12px;">Password Reset!</h2>
        <p style="font-size:15px; color:var(--text-secondary); line-height:1.7; margin-bottom:28px;" id="successMsg">
          Your password has been updated successfully.
        </p>
        <div id="successButtons" style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;"></div>
      </div>

      <!-- ERROR STATE -->
      <div id="stateError" style="display:none; text-align:center;">
        <div style="font-size:64px; margin-bottom:16px;">❌</div>
        <h2 style="font-size:22px; font-weight:800; color:var(--secondary); margin-bottom:12px;">Link Invalid</h2>
        <p style="font-size:14px; color:var(--text-secondary); line-height:1.7; margin-bottom:28px;" id="errorMsg">
          This reset link is invalid or has expired.
        </p>
        <a href="index.html"
          style="padding:12px 24px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; border-radius:10px; font-size:14px; font-weight:700; text-decoration:none;">
          ← Back to Home
        </a>
      </div>

    </div>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="js/main.js"></script>
  <script>
    let resetToken = null;

    document.addEventListener('DOMContentLoaded', function () {
      const urlParams = new URLSearchParams(window.location.search);
      resetToken      = urlParams.get('token');

      if (!resetToken) {
        document.getElementById('errorMsg').textContent =
          'No reset token found. Please request a new password reset link.';
        showState('error');
        return;
      }

      // Token exists in URL — show the form
      // (We validate on submission, not on load, to avoid wasting the token)
      showState('form');
    });

    async function submitReset() {
      const newPw     = document.getElementById('newPw').value;
      const confirmPw = document.getElementById('confirmPw').value;
      const errEl     = document.getElementById('formError');
      const btn       = document.getElementById('resetBtn');

      errEl.style.display = 'none';

      // Validate
      if (!newPw || newPw.length < 6) {
        errEl.textContent   = '⚠️ Password must be at least 6 characters.';
        errEl.style.display = 'block';
        return;
      }

      if (newPw !== confirmPw) {
        errEl.textContent   = '⚠️ Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Resetting...';
      btn.disabled    = true;

      const result = await apiRequest('/auth/reset-password', 'POST', {
        token:       resetToken,
        newPassword: newPw
      });

      btn.disabled    = false;
      btn.textContent = 'Reset Password →';

      if (result.ok) {
        document.getElementById('successMsg').textContent = result.data.message;

        // Show appropriate login button based on role
        const role    = result.data.role || 'student';
        const btnsEl  = document.getElementById('successButtons');

        if (role === 'teacher') {
          btnsEl.innerHTML = `
            <a href="teacher.html"
              style="padding:13px 28px; background:linear-gradient(135deg,#43e97b,#38f9d7); color:#0f0f1a; border-radius:10px; font-size:15px; font-weight:800; text-decoration:none;">
              📚 Login as Teacher →
            </a>`;
        } else if (role === 'admin') {
          btnsEl.innerHTML = `
            <a href="admin.html"
              style="padding:13px 28px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; border-radius:10px; font-size:15px; font-weight:800; text-decoration:none;">
              ⚙️ Login as Admin →
            </a>`;
        } else {
          btnsEl.innerHTML = `
            <a href="index.html"
              style="padding:13px 28px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; border-radius:10px; font-size:15px; font-weight:800; text-decoration:none;">
              Login Now →
            </a>`;
        }

        showState('success');
      } else {
        if (result.data.expired) {
          document.getElementById('errorMsg').textContent =
            result.data.message + ' Please request a new reset link.';
          showState('error');
        } else {
          errEl.textContent   = result.data.message || 'Reset failed.';
          errEl.style.display = 'block';
        }
      }
    }

    function showState(name) {
      ['Loading','Form','Success','Error'].forEach(s => {
        const el = document.getElementById(`state${s}`);
        if (el) el.style.display = 'none';
      });
      const target = `state${name.charAt(0).toUpperCase()}${name.slice(1)}`;
      const el = document.getElementById(target);
      if (el) el.style.display = 'block';
    }
  </script>
</body>
</html>
