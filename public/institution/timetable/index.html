<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timetable Builder — LatLomp Institution</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --primary:#6c63ff; --pd:#574fd6; --green:#43e97b; --red:#ff6584;
      --orange:#ffa500; --yellow:#ffd600;
      --dark:#0f0f1a;   --dark-2:#1a1a2e;
      --border:rgba(255,255,255,0.08);
      --text:#fff; --muted:#6b6b8a; --secondary:#a0a0c0;
    }
    html, body { margin:0; padding:0; background:var(--dark); color:var(--text); font-family:'Inter',sans-serif; }
    @keyframes spin   { to { transform:rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    .topbar { position:sticky; top:0; z-index:300; background:var(--dark-2); border-bottom:1px solid var(--border); height:60px; display:flex; align-items:center; padding:0 24px; gap:16px; }
    .topbar-brand { font-size:15px; font-weight:800; color:#fff; white-space:nowrap; }
    .topbar-back  { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--secondary); font-size:13px; font-weight:600; text-decoration:none; transition:all 0.2s; margin-left:auto; white-space:nowrap; }
    .topbar-back:hover { color:#fff; background:rgba(255,255,255,0.1); }

    .main { max-width:1300px; margin:0 auto; padding:28px 24px 60px; }
    @media (max-width:700px) { .main { padding:18px 14px 48px; } }

    .page-header { margin-bottom:22px; animation:fadeUp 0.3s ease; }
    .page-header h1 { font-size:22px; font-weight:800; color:#fff; margin:0 0 4px; }
    .page-header p  { font-size:13px; color:var(--muted); margin:0; }

    .card { background:var(--dark-2); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:20px; }
    .card-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
    .card-head h3 { font-size:15px; font-weight:700; color:#fff; margin:0; }
    .card-body { padding:20px; }

    .sel-grid { display:grid; grid-template-columns:1fr auto auto; gap:14px; align-items:end; }
    @media (max-width:600px) { .sel-grid { grid-template-columns:1fr; } }

    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:11px; font-weight:700; color:var(--secondary); text-transform:uppercase; letter-spacing:0.4px; }
    .sel, .inp { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:9px; padding:11px 13px; color:#fff; font-size:14px; font-family:inherit; outline:none; width:100%; transition:border-color 0.2s; }
    .sel:focus, .inp:focus { border-color:var(--primary); }
    .sel option { background:var(--dark-2); }

    .btn { display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; border:none; transition:all 0.2s; text-decoration:none; white-space:nowrap; }
    .btn-primary   { background:linear-gradient(135deg,var(--primary),var(--pd)); color:#fff; }
    .btn-primary:hover  { transform:translateY(-1px); box-shadow:0 4px 16px rgba(108,99,255,0.4); }
    .btn-green     { background:linear-gradient(135deg,var(--green),#38f9d7); color:#0f0f1a; }
    .btn-green:hover    { transform:translateY(-1px); box-shadow:0 4px 14px rgba(67,233,123,0.35); }
    .btn-danger    { background:rgba(255,101,132,0.1); border:1px solid rgba(255,101,132,0.3); color:var(--red); }
    .btn-danger:hover { background:rgba(255,101,132,0.2); }
    .btn-secondary { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--secondary); }
    .btn-secondary:hover { color:#fff; background:rgba(255,255,255,0.1); }
    .btn-orange    { background:rgba(255,165,0,0.1); border:1px solid rgba(255,165,0,0.3); color:var(--orange); }
    .btn-orange:hover { background:rgba(255,165,0,0.2); }
    .btn-sm { padding:6px 11px; font-size:12px; border-radius:7px; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-green  { background:rgba(67,233,123,0.12);  color:var(--green); }
    .badge-orange { background:rgba(255,165,0,0.12);   color:var(--orange); }
    .badge-muted  { background:rgba(255,255,255,0.06); color:var(--secondary); }

    /* ---- GRID ---- */
    .grid-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .tt-grid { border-collapse:collapse; width:100%; min-width:780px; }
    .tt-grid th { padding:10px 8px; text-align:center; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); background:rgba(255,255,255,0.02); border:1px solid var(--border); white-space:nowrap; }
    .tt-grid th.period-col { text-align:left; padding-left:14px; width:130px; }
    .tt-grid td { border:1px solid var(--border); padding:0; vertical-align:top; height:64px; }
    .tt-period-label { padding:8px 12px; font-size:12px; font-weight:700; color:#fff; background:rgba(255,255,255,0.03); white-space:nowrap; }
    .tt-period-time  { font-size:10px; color:var(--muted); font-weight:400; margin-top:1px; }

    .tt-cell { width:100%; height:100%; min-height:64px; padding:6px 8px; cursor:pointer; transition:background 0.15s; position:relative; }
    .tt-cell:hover { background:rgba(108,99,255,0.06); }
    .tt-cell.has-slot { cursor:pointer; }
    .tt-cell.is-break { background:repeating-linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 6px, transparent 6px, transparent 12px); cursor:default; }
    .tt-cell-subject { font-size:12px; font-weight:800; color:#fff; line-height:1.3; margin-bottom:2px; }
    .tt-cell-teacher  { font-size:10px; color:var(--secondary); }
    .tt-cell-room     { font-size:10px; color:var(--muted); margin-top:1px; }
    .tt-cell-empty    { font-size:11px; color:var(--muted); display:flex; align-items:center; justify-content:center; height:100%; opacity:0; transition:opacity 0.15s; }
    .tt-cell:hover .tt-cell-empty { opacity:1; }
    .tt-cell-break-label { font-size:11px; color:var(--muted); font-style:italic; display:flex; align-items:center; justify-content:center; height:100%; }

    .legend-row { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:16px; font-size:12px; color:var(--secondary); align-items:center; }
    .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:5px; vertical-align:middle; }

    /* ---- MODAL ---- */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.78); z-index:600; display:none; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
    .modal-overlay.active { display:flex; }
    .modal-box { background:var(--dark-2); border:1px solid var(--border); border-radius:20px; padding:28px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .modal-header h2 { font-size:17px; font-weight:800; color:#fff; margin:0; }
    .modal-close { width:30px; height:30px; border-radius:7px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--muted); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; font-family:inherit; transition:all 0.2s; }
    .modal-close:hover { background:rgba(255,101,132,0.15); color:var(--red); }
    .modal-footer { display:flex; justify-content:space-between; gap:10px; padding-top:16px; border-top:1px solid var(--border); margin-top:18px; flex-wrap:wrap; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
    @media (max-width:480px) { .field-row { grid-template-columns:1fr; } }
    .field-block { margin-bottom:14px; }
    .toggle-row { display:flex; align-items:center; gap:10px; padding:10px 0; }
    .conflict-box { background:rgba(255,101,132,0.08); border:1px solid rgba(255,101,132,0.3); border-radius:10px; padding:12px 14px; font-size:13px; color:var(--red); margin-bottom:14px; display:none; line-height:1.6; }

    .period-row { display:flex; gap:8px; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
    .period-row:last-child { border-bottom:none; }
    .period-row input { width:100%; }
    .period-row .pr-label { width:90px; flex-shrink:0; font-size:13px; font-weight:600; color:var(--secondary); }
    .period-row .pr-break { width:60px; flex-shrink:0; }

    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }

    .empty { text-align:center; padding:48px 20px; }
    .empty-icon  { font-size:48px; margin-bottom:12px; }
    .empty-title { font-size:15px; font-weight:700; color:var(--secondary); margin-bottom:8px; }
    .empty-sub   { font-size:13px; color:var(--muted); line-height:1.7; }

    .toast { position:fixed; bottom:24px; right:24px; background:var(--dark-2); border:1px solid var(--border); border-radius:10px; padding:13px 18px; font-size:13px; font-weight:600; color:#fff; z-index:9999; box-shadow:0 8px 32px rgba(0,0,0,0.4); max-width:320px; display:none; }
    @media (max-width:600px) { .toast { bottom:12px; right:12px; left:12px; max-width:none; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">📅 Timetable Builder</div>
  <a class="topbar-back" href="/institution/school/dashboard.html">&larr; Dashboard</a>
</div>

<div class="main">

  <div class="page-header">
    <h1>Timetable Builder</h1>
    <p>Build and manage class timetables. Click any cell to add or edit a subject.</p>
  </div>

  <!-- SELECTOR -->
  <div class="card">
    <div class="card-head"><h3>Select Class</h3></div>
    <div class="card-body">
      <div class="sel-grid">
        <div class="field">
          <label>Class</label>
          <select id="selClass" class="sel" onchange="onClassChange()">
            <option value="">-- Select Class --</option>
          </select>
        </div>
        <button class="btn btn-secondary" onclick="openPeriodModal()">⚙️ Period Times</button>
        <button class="btn btn-danger" id="clearAllBtn" onclick="clearClassTimetable()" disabled>🗑 Clear All</button>
      </div>
    </div>
  </div>

  <!-- GRID AREA -->
  <div id="gridArea"></div>

</div>

<!-- SLOT EDIT MODAL -->
<div class="modal-overlay" id="slotModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="slotModalTitle">Add Subject</h2>
      <button class="modal-close" onclick="closeSlotModal()">✕</button>
    </div>

    <div class="conflict-box" id="conflictBox"></div>

    <input type="hidden" id="slotId" />
    <input type="hidden" id="slotClassId" />
    <input type="hidden" id="slotDay" />
    <input type="hidden" id="slotPeriod" />

    <div style="font-size:12px; color:var(--muted); margin-bottom:14px;" id="slotContextLabel"></div>

    <div class="toggle-row">
      <input type="checkbox" id="slotIsBreak" onchange="onBreakToggle()" style="width:18px; height:18px; cursor:pointer;" />
      <label for="slotIsBreak" style="font-size:13px; font-weight:600; color:var(--secondary); cursor:pointer;">This is a break / lunch period (no subject)</label>
    </div>

    <div id="subjectFields">
      <div class="field-block">
        <label style="font-size:11px; font-weight:700; color:var(--secondary); text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:6px;">Subject</label>
        <select id="slotSubjectSel" class="sel" onchange="onSubjectSelect()">
          <option value="">-- Select Subject --</option>
        </select>
      </div>
      <div class="field-block">
        <label style="font-size:11px; font-weight:700; color:var(--secondary); text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:6px;">Teacher</label>
        <select id="slotTeacherSel" class="sel">
          <option value="">-- No teacher assigned --</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Room</label>
          <input type="text" id="slotRoom" class="inp" placeholder="e.g. Block A Room 2" />
        </div>
        <div class="field">
          <label>Colour</label>
          <input type="color" id="slotColor" class="inp" value="#6c63ff" style="height:42px; padding:4px;" />
        </div>
      </div>
      <div class="field-block">
        <label style="font-size:11px; font-weight:700; color:var(--secondary); text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:6px;">Notes (optional)</label>
        <input type="text" id="slotNotes" class="inp" placeholder="e.g. Bring calculators" />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-danger" id="deleteSlotBtn" onclick="deleteSlot()" style="display:none;">🗑 Delete</button>
      <div style="display:flex; gap:10px; margin-left:auto;">
        <button class="btn btn-secondary" onclick="closeSlotModal()">Cancel</button>
        <button class="btn btn-green" id="saveSlotBtn" onclick="saveSlot()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- PERIOD CONFIG MODAL -->
<div class="modal-overlay" id="periodModal">
  <div class="modal-box" style="max-width:560px;">
    <div class="modal-header">
      <h2>Period Times</h2>
      <button class="modal-close" onclick="closePeriodModal()">✕</button>
    </div>
    <p style="font-size:13px; color:var(--secondary); margin:0 0 16px; line-height:1.6;">
      Set the start and end time for each period. These apply to the whole school across all classes.
    </p>
    <div id="periodList"></div>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button class="btn btn-secondary btn-sm" onclick="addPeriodRow()">+ Add Period</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePeriodModal()">Cancel</button>
      <button class="btn btn-green" id="savePeriodsBtn" onclick="savePeriods()">💾 Save Period Times</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/institution/js/inst.api.js"></script>
<script>
/* ============================================
   ✅ PHASE N STAGE 2: TIMETABLE BUILDER
   School admin builds a visual week grid.
   Click any cell to add/edit a subject slot.
   Teacher conflicts are detected server-side
   and shown inline before saving.
============================================ */

var _classes  = [];
var _subjects = [];
var _teachers = [];
var _periods  = [];
var _slots    = [];          /* current class's slots */
var _slotMap  = {};          /* key: day_period -> slot */
var _currentClassId = '';

var DAYS = [
  { key: 'monday',    label: 'Mon' },
  { key: 'tuesday',   label: 'Tue' },
  { key: 'wednesday', label: 'Wed' },
  { key: 'thursday',  label: 'Thu' },
  { key: 'friday',    label: 'Fri' },
  { key: 'saturday',  label: 'Sat' }
];

var SUBJECT_COLORS = [
  '#6c63ff', '#43e97b', '#ff6584', '#ffa500', '#a78bfa',
  '#38f9d7', '#ffd600', '#ff8e53', '#4facfe', '#f093fb'
];

/* ============================================ INIT */
document.addEventListener('DOMContentLoaded', async function () {
  if (!instRequireAuth('school_admin')) { return; }
  await loadStructure();
  await loadPeriods();
});

async function loadStructure() {
  var [cRes, sRes, tRes] = await Promise.all([
    instApi('/structure/classes'),
    instApi('/structure/subjects'),
    instApi('/school/teachers')
  ]);
  _classes  = cRes.ok ? (cRes.data.classes  || []) : [];
  _subjects = sRes.ok ? (sRes.data.subjects || []) : [];
  _teachers = tRes.ok ? (tRes.data.teachers || []) : [];

  fillSel('selClass', _classes, 'name', '_id');

  /* Fill subject + teacher selects (reused across all cells) */
  var subjSel = document.getElementById('slotSubjectSel');
  if (subjSel) {
    subjSel.innerHTML = '<option value="">-- Select Subject --</option>' +
      _subjects.map(function (s, idx) {
        return '<option value="' + s._id + '" data-color="' + (SUBJECT_COLORS[idx % SUBJECT_COLORS.length]) + '">' + esc(s.name) + '</option>';
      }).join('');
  }
  var teachSel = document.getElementById('slotTeacherSel');
  if (teachSel) {
    teachSel.innerHTML = '<option value="">-- No teacher assigned --</option>' +
      _teachers.filter(function (t) { return t.isActive !== false; }).map(function (t) {
        return '<option value="' + t._id + '">' + esc(t.name) + '</option>';
      }).join('');
  }

  if (_classes.length === 0) {
    document.getElementById('gridArea').innerHTML = buildEmptyState(
      '🏗️', 'No classes set up yet',
      'Go to <a href="/institution/school/dashboard.html" style="color:var(--primary);">Academic Structure</a> and add classes first.'
    );
  }
}

function fillSel(selectId, items, labelKey, valueKey) {
  var el = document.getElementById(selectId);
  if (!el) { return; }
  el.innerHTML = '<option value="">-- Select --</option>' +
    items.map(function (item) {
      return '<option value="' + item[valueKey] + '">' + esc(item[labelKey]) + '</option>';
    }).join('');
}

/* ============================================ PERIODS */
async function loadPeriods() {
  var res = await instApi('/timetable/periods');
  _periods = res.ok ? (res.data.periods || []) : [];
}

function onClassChange() {
  _currentClassId = document.getElementById('selClass').value;
  var btn = document.getElementById('clearAllBtn');
  if (btn) { btn.disabled = !_currentClassId; }
  if (_currentClassId) {
    loadClassTimetable();
  } else {
    document.getElementById('gridArea').innerHTML = buildEmptyState(
      '📅', 'Select a class above', 'Then build its timetable using the visual grid.'
    );
  }
}

/* ============================================ LOAD TIMETABLE */
async function loadClassTimetable() {
  var area = document.getElementById('gridArea');
  area.innerHTML = '<div class="card"><div class="card-body" style="text-align:center; padding:40px;"><span class="spinner" style="width:28px; height:28px; border-width:3px;"></span></div></div>';

  var res = await instApi('/timetable/class/' + _currentClassId);
  if (!res.ok) {
    area.innerHTML = buildEmptyState('⚠️', 'Failed to load timetable', esc((res.data && res.data.message) || 'Unknown error'));
    return;
  }

  _slots = res.data.slots || [];
  _slotMap = {};
  _slots.forEach(function (slot) {
    _slotMap[slot.day + '_' + slot.period] = slot;
  });

  renderGrid();
}

/* ============================================ RENDER GRID */
function renderGrid() {
  var area = document.getElementById('gridArea');
  if (!_periods.length) {
    area.innerHTML = buildEmptyState('⚙️', 'No period times configured', 'Click "Period Times" above to set up your school day.');
    return;
  }

  var clsEl  = document.getElementById('selClass');
  var clsName = clsEl.selectedIndex > 0 ? clsEl.options[clsEl.selectedIndex].text : '';

  /* Legend: distinct subjects currently on this timetable */
  var usedSubjects = {};
  _slots.forEach(function (s) {
    if (s.subjectId && s.subjectId.name) {
      usedSubjects[s.subjectId.name] = s.color || '#6c63ff';
    } else if (s.subjectName) {
      usedSubjects[s.subjectName] = s.color || '#6c63ff';
    }
  });
  var legendHtml = Object.keys(usedSubjects).map(function (name) {
    return '<span><span class="legend-dot" style="background:' + usedSubjects[name] + ';"></span>' + esc(name) + '</span>';
  }).join('');

  /* Header row */
  var headerCols = '<th class="period-col">Period / Time</th>' +
    DAYS.map(function (d) { return '<th>' + d.label + '</th>'; }).join('');

  /* Body rows — one per period */
  var bodyRows = _periods.map(function (p) {
    var rowCells = DAYS.map(function (d) {
      var key  = d.key + '_' + p.period;
      var slot = _slotMap[key];

      if (p.isBreak) {
        return '<td><div class="tt-cell is-break"><div class="tt-cell-break-label">' + esc(p.label) + '</div></div></td>';
      }

      if (slot) {
        var subjName = (slot.subjectId && slot.subjectId.name) || slot.subjectName || 'Untitled';
        var teachName = (slot.teacherId && slot.teacherId.name) || slot.teacherName || '';
        var color = slot.color || '#6c63ff';
        return '<td onclick="openSlotModal(\'' + d.key + '\',' + p.period + ')">' +
          '<div class="tt-cell has-slot" style="border-left:3px solid ' + color + ';">' +
            '<div class="tt-cell-subject">' + esc(subjName) + '</div>' +
            (teachName ? '<div class="tt-cell-teacher">' + esc(teachName) + '</div>' : '') +
            (slot.room ? '<div class="tt-cell-room">📍 ' + esc(slot.room) + '</div>' : '') +
          '</div>' +
        '</td>';
      }

      return '<td onclick="openSlotModal(\'' + d.key + '\',' + p.period + ')">' +
        '<div class="tt-cell"><div class="tt-cell-empty">+ Add</div></div>' +
      '</td>';
    }).join('');

    return '<tr>' +
      '<td><div class="tt-period-label">' + esc(p.label) +
        '<div class="tt-period-time">' + esc(p.startTime || '') + (p.endTime ? ' – ' + esc(p.endTime) : '') + '</div>' +
      '</div></td>' +
      rowCells +
    '</tr>';
  }).join('');

  area.innerHTML =
    (legendHtml ? '<div class="legend-row">' + legendHtml + '</div>' : '') +
    '<div class="card">' +
      '<div class="card-head"><h3>' + esc(clsName) + ' — Weekly Timetable</h3>' +
        '<span style="font-size:12px; color:var(--muted);">' + _slots.length + ' slot' + (_slots.length !== 1 ? 's' : '') + ' scheduled</span>' +
      '</div>' +
      '<div class="grid-wrap">' +
        '<table class="tt-grid">' +
          '<thead><tr>' + headerCols + '</tr></thead>' +
          '<tbody>' + bodyRows + '</tbody>' +
        '</table>' +
      '</div>' +
    '</div>';
}

/* ============================================ SLOT MODAL */
function openSlotModal(day, period) {
  if (!_currentClassId) { return; }

  var key  = day + '_' + period;
  var slot = _slotMap[key];

  document.getElementById('slotId').value       = slot ? slot._id : '';
  document.getElementById('slotClassId').value   = _currentClassId;
  document.getElementById('slotDay').value       = day;
  document.getElementById('slotPeriod').value    = period;
  document.getElementById('conflictBox').style.display = 'none';

  var periodInfo = _periods.find(function (p) { return p.period === period; });
  var dayLabel   = DAYS.find(function (d) { return d.key === day; });
  document.getElementById('slotContextLabel').textContent =
    (dayLabel ? dayLabel.label : day) + ' — ' + (periodInfo ? periodInfo.label : 'Period ' + period) +
    (periodInfo && periodInfo.startTime ? ' (' + periodInfo.startTime + '–' + periodInfo.endTime + ')' : '');

  if (slot) {
    document.getElementById('slotModalTitle').textContent = 'Edit Slot';
    document.getElementById('slotIsBreak').checked = !!slot.isBreak;
    document.getElementById('slotSubjectSel').value = (slot.subjectId && slot.subjectId._id) || '';
    document.getElementById('slotTeacherSel').value = (slot.teacherId && slot.teacherId._id) || '';
    document.getElementById('slotRoom').value       = slot.room  || '';
    document.getElementById('slotColor').value      = slot.color || '#6c63ff';
    document.getElementById('slotNotes').value      = slot.notes || '';
    document.getElementById('deleteSlotBtn').style.display = 'inline-flex';
    document.getElementById('saveSlotBtn').textContent     = 'Save Changes';
  } else {
    document.getElementById('slotModalTitle').textContent  = 'Add Subject';
    document.getElementById('slotIsBreak').checked          = false;
    document.getElementById('slotSubjectSel').value         = '';
    document.getElementById('slotTeacherSel').value         = '';
    document.getElementById('slotRoom').value                = '';
    document.getElementById('slotColor').value                = SUBJECT_COLORS[Math.floor(Math.random() * SUBJECT_COLORS.length)];
    document.getElementById('slotNotes').value                = '';
    document.getElementById('deleteSlotBtn').style.display    = 'none';
    document.getElementById('saveSlotBtn').textContent        = 'Add Subject';
  }

  onBreakToggle();
  document.getElementById('slotModal').classList.add('active');
}

function closeSlotModal() {
  document.getElementById('slotModal').classList.remove('active');
}

function onBreakToggle() {
  var isBreak = document.getElementById('slotIsBreak').checked;
  document.getElementById('subjectFields').style.display = isBreak ? 'none' : 'block';
}

function onSubjectSelect() {
  var sel = document.getElementById('slotSubjectSel');
  var opt = sel.options[sel.selectedIndex];
  var color = opt ? opt.getAttribute('data-color') : null;
  if (color) {
    document.getElementById('slotColor').value = color;
  }
}

/* ============================================ SAVE SLOT */
async function saveSlot() {
  var slotId    = document.getElementById('slotId').value;
  var classId   = document.getElementById('slotClassId').value;
  var day       = document.getElementById('slotDay').value;
  var period    = parseInt(document.getElementById('slotPeriod').value);
  var isBreak   = document.getElementById('slotIsBreak').checked;
  var conflictBox = document.getElementById('conflictBox');
  conflictBox.style.display = 'none';

  var payload = { classId: classId, day: day, period: period, isBreak: isBreak };

  if (!isBreak) {
    var subjSel  = document.getElementById('slotSubjectSel');
    var subjOpt  = subjSel.options[subjSel.selectedIndex];
    var subjId   = subjSel.value;
    var subjName = subjOpt ? subjOpt.textContent : '';

    if (!subjId) {
      showToast('Please select a subject or mark this as a break.', 'error');
      return;
    }

    var teachSel  = document.getElementById('slotTeacherSel');
    var teachOpt  = teachSel.options[teachSel.selectedIndex];
    var teachId   = teachSel.value;
    var teachName = teachId ? teachOpt.textContent : '';

    payload.subjectId   = subjId;
    payload.subjectName = subjName;
    payload.teacherId    = teachId || null;
    payload.teacherName  = teachName;
    payload.room          = document.getElementById('slotRoom').value.trim();
    payload.color         = document.getElementById('slotColor').value;
    payload.notes          = document.getElementById('slotNotes').value.trim();
  }

  var btn = document.getElementById('saveSlotBtn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  var res = slotId
    ? await instApi('/timetable/' + slotId, 'PUT', payload)
    : await instApi('/timetable', 'POST', payload);

  btn.innerHTML = slotId ? 'Save Changes' : 'Add Subject';
  btn.disabled = false;

  if (res.ok) {
    closeSlotModal();
    showToast(res.data.message || 'Saved.', 'success');
    loadClassTimetable();
  } else {
    if (res.data && res.data.code === 'TEACHER_CONFLICT') {
      conflictBox.textContent = res.data.message;
      conflictBox.style.display = 'block';
    } else {
      showToast((res.data && res.data.message) || 'Save failed.', 'error');
    }
  }
}

async function deleteSlot() {
  var slotId = document.getElementById('slotId').value;
  if (!slotId) { return; }
  if (!confirm('Remove this slot from the timetable?')) { return; }

  var res = await instApi('/timetable/' + slotId, 'DELETE');
  if (res.ok) {
    closeSlotModal();
    showToast('Slot removed.', 'success');
    loadClassTimetable();
  } else {
    showToast((res.data && res.data.message) || 'Failed.', 'error');
  }
}

/* ============================================ CLEAR ALL */
async function clearClassTimetable() {
  if (!_currentClassId) { return; }
  if (!confirm('Clear the ENTIRE timetable for this class?\n\nThis removes all subjects, teachers and rooms for every day. This cannot be undone.')) { return; }

  var res = await instApi('/timetable/class/' + _currentClassId + '/clear', 'DELETE');
  if (res.ok) {
    showToast(res.data.message || 'Cleared.', 'success');
    loadClassTimetable();
  } else {
    showToast((res.data && res.data.message) || 'Failed.', 'error');
  }
}

/* ============================================ PERIOD CONFIG MODAL */
function openPeriodModal() {
  renderPeriodList();
  document.getElementById('periodModal').classList.add('active');
}
function closePeriodModal() {
  document.getElementById('periodModal').classList.remove('active');
}

function renderPeriodList() {
  var list = document.getElementById('periodList');
  var working = _periods.length ? _periods.slice() : [
    { period: 1, label: 'Period 1', startTime: '08:00', endTime: '08:45', isBreak: false }
  ];
  list.innerHTML = working.map(function (p, idx) {
    return '<div class="period-row" id="prow_' + idx + '">' +
      '<input type="text" class="inp pr-label" value="' + esc(p.label || '') + '" placeholder="Label" id="pr_label_' + idx + '" />' +
      '<input type="time" class="inp" value="' + esc(p.startTime || '') + '" id="pr_start_' + idx + '" />' +
      '<input type="time" class="inp" value="' + esc(p.endTime || '') + '" id="pr_end_' + idx + '" />' +
      '<label class="pr-break" style="display:flex; align-items:center; gap:4px; font-size:11px; color:var(--muted); cursor:pointer;">' +
        '<input type="checkbox" id="pr_break_' + idx + '" ' + (p.isBreak ? 'checked' : '') + ' style="cursor:pointer;" /> Break' +
      '</label>' +
      '<button type="button" class="btn btn-danger btn-sm" onclick="removePeriodRow(' + idx + ')">✕</button>' +
    '</div>';
  }).join('');
  list.dataset.count = working.length;
}

function addPeriodRow() {
  var list  = document.getElementById('periodList');
  var count = parseInt(list.dataset.count || '0');
  var idx   = count;
  var div = document.createElement('div');
  div.className = 'period-row';
  div.id = 'prow_' + idx;
  div.innerHTML =
    '<input type="text" class="inp pr-label" value="Period ' + (idx + 1) + '" id="pr_label_' + idx + '" />' +
    '<input type="time" class="inp" value="" id="pr_start_' + idx + '" />' +
    '<input type="time" class="inp" value="" id="pr_end_' + idx + '" />' +
    '<label class="pr-break" style="display:flex; align-items:center; gap:4px; font-size:11px; color:var(--muted); cursor:pointer;">' +
      '<input type="checkbox" id="pr_break_' + idx + '" style="cursor:pointer;" /> Break' +
    '</label>' +
    '<button type="button" class="btn btn-danger btn-sm" onclick="removePeriodRow(' + idx + ')">✕</button>';
  list.appendChild(div);
  list.dataset.count = idx + 1;
}

function removePeriodRow(idx) {
  var row = document.getElementById('prow_' + idx);
  if (row) { row.remove(); }
}

async function savePeriods() {
  var list  = document.getElementById('periodList');
  var count = parseInt(list.dataset.count || '0');
  var periods = [];
  var periodNum = 1;

  for (var i = 0; i < count; i++) {
    var labelEl = document.getElementById('pr_label_' + i);
    if (!labelEl) { continue; } /* row was removed */
    var label   = labelEl.value.trim();
    var start   = (document.getElementById('pr_start_' + i) || {}).value || '';
    var end     = (document.getElementById('pr_end_'   + i) || {}).value || '';
    var isBreak = (document.getElementById('pr_break_' + i) || {}).checked || false;

    if (!label) { continue; }

    periods.push({ period: periodNum, label: label, startTime: start, endTime: end, isBreak: isBreak });
    periodNum++;
  }

  if (periods.length === 0) {
    showToast('Add at least one period.', 'error');
    return;
  }

  var btn = document.getElementById('savePeriodsBtn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  var res = await instApi('/timetable/periods', 'POST', { periods: periods });

  btn.innerHTML = '💾 Save Period Times';
  btn.disabled = false;

  if (res.ok) {
    _periods = periods;
    closePeriodModal();
    showToast('Period times saved.', 'success');
    if (_currentClassId) { renderGrid(); }
  } else {
    showToast((res.data && res.data.message) || 'Failed.', 'error');
  }
}

/* ============================================ HELPERS */
function buildEmptyState(icon, title, sub) {
  return '<div class="card"><div class="card-body"><div class="empty">' +
    '<div class="empty-icon">' + icon + '</div>' +
    '<div class="empty-title">' + esc(title) + '</div>' +
    '<div class="empty-sub">' + sub + '</div>' +
  '</div></div></div>';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  if (!t) { return; }
  t.textContent   = msg;
  t.style.display = 'block';
  t.style.borderColor = type === 'success' ? 'rgba(67,233,123,0.4)' : type === 'error' ? 'rgba(255,101,132,0.4)' : 'var(--border)';
  t.style.color   = type === 'success' ? 'var(--green)' : type === 'error' ? 'var(--red)' : '#fff';
  clearTimeout(t._to);
  t._to = setTimeout(function () { t.style.display = 'none'; }, 4000);
}

document.addEventListener('click', function (e) {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('active');
  }
});
</script>
