<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Timetable — LatLomp Institution</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --primary:#6c63ff; --green:#43e97b;
      --dark:#0f0f1a; --dark-2:#1a1a2e;
      --border:rgba(255,255,255,0.08);
      --text:#fff; --muted:#6b6b8a; --secondary:#a0a0c0;
    }
    html, body { margin:0; padding:0; background:var(--dark); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .header { text-align:center; padding:32px 20px 20px; }
    .header-logo { width:56px; height:56px; border-radius:12px; object-fit:cover; margin:0 auto 12px; display:block; }
    .header-logo-placeholder { width:56px; height:56px; border-radius:12px; margin:0 auto 12px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900; color:#fff; }
    .header-school { font-size:18px; font-weight:800; color:#fff; }
    .header-class  { font-size:14px; color:var(--secondary); margin-top:4px; }

    .main { max-width:1100px; margin:0 auto; padding:0 20px 60px; }

    .grid-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:16px; border:1px solid var(--border); }
    .tt-grid { border-collapse:collapse; width:100%; min-width:780px; background:var(--dark-2); }
    .tt-grid th { padding:12px 8px; text-align:center; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); background:rgba(255,255,255,0.02); border:1px solid var(--border); white-space:nowrap; }
    .tt-grid th.period-col { text-align:left; padding-left:16px; width:140px; }
    .tt-grid td { border:1px solid var(--border); padding:0; vertical-align:top; height:68px; }
    .tt-period-label { padding:10px 14px; font-size:13px; font-weight:700; color:#fff; background:rgba(255,255,255,0.03); white-space:nowrap; }
    .tt-period-time  { font-size:10px; color:var(--muted); font-weight:400; margin-top:1px; }
    .tt-cell { width:100%; height:100%; min-height:68px; padding:8px 10px; }
    .tt-cell.is-break { background:repeating-linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 6px, transparent 6px, transparent 12px); }
    .tt-cell-subject { font-size:13px; font-weight:800; color:#fff; line-height:1.3; margin-bottom:3px; }
    .tt-cell-teacher  { font-size:11px; color:var(--secondary); }
    .tt-cell-room     { font-size:10px; color:var(--muted); margin-top:2px; }
    .tt-cell-break-label { font-size:12px; color:var(--muted); font-style:italic; display:flex; align-items:center; justify-content:center; height:100%; }
    .tt-cell-empty    { font-size:11px; color:var(--muted); opacity:0.3; display:flex; align-items:center; justify-content:center; height:100%; }

    .spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,0.2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:60px auto; display:block; }

    .empty { text-align:center; padding:60px 20px; }
    .empty-icon  { font-size:52px; margin-bottom:14px; }
    .empty-title { font-size:16px; font-weight:700; color:var(--secondary); margin-bottom:8px; }
    .empty-sub   { font-size:13px; color:var(--muted); line-height:1.7; }

    .footer-note { text-align:center; padding:24px 20px; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>

<div class="header" id="headerArea">
  <div class="spinner"></div>
</div>

<div class="main" id="mainArea"></div>

<div class="footer-note">Powered by LatLomp Institution Platform</div>

<script>
/* ============================================
   ✅ PHASE N STAGE 3: PUBLIC CLASS TIMETABLE
   No login required. Accessed via:
   /institution/timetable/class.html?slug=SCHOOL_SLUG&classId=CLASS_ID

   Calls the public endpoint added in Stage 3:
   GET /api/institution/timetable/public/:slug/:classId
============================================ */

var DAYS = [
  { key: 'monday',    label: 'Mon' },
  { key: 'tuesday',   label: 'Tue' },
  { key: 'wednesday', label: 'Wed' },
  { key: 'thursday',  label: 'Thu' },
  { key: 'friday',    label: 'Fri' },
  { key: 'saturday',  label: 'Sat' }
];

document.addEventListener('DOMContentLoaded', async function () {
  var params  = new URLSearchParams(window.location.search);
  var slug    = params.get('slug');
  var classId = params.get('classId');

  if (!slug || !classId) {
    showError('⚠️', 'Invalid Link', 'This timetable link is missing required information. Please ask your school for the correct link.');
    return;
  }

  try {
    var res  = await fetch('/api/institution/timetable/public/' + encodeURIComponent(slug) + '/' + encodeURIComponent(classId));
    var data = await res.json();

    if (!res.ok || !data.success) {
      showError('⚠️', 'Timetable Not Found', esc(data.message || 'Could not load this timetable.'));
      return;
    }

    renderPage(data);
  } catch (e) {
    showError('⚠️', 'Connection Error', 'Could not reach the server. Please try again.');
  }
});

function renderPage(data) {
  var school   = data.school  || {};
  var cls      = data.class   || {};
  var periods  = data.periods || [];
  var grouped  = data.grouped || {};

  var headerArea = document.getElementById('headerArea');
  var primary    = school.primaryColor || '#6c63ff';

  var logoHtml = school.logo
    ? '<img src="' + esc(school.logo) + '" class="header-logo" alt="Logo" />'
    : '<div class="header-logo-placeholder" style="background:' + primary + ';">' + esc((school.name || 'S').charAt(0)) + '</div>';

  headerArea.innerHTML =
    logoHtml +
    '<div class="header-school">' + esc(school.name || 'School') + '</div>' +
    '<div class="header-class">' + esc(cls.name || '') + ' — Weekly Timetable</div>';

  var mainArea = document.getElementById('mainArea');

  if (periods.length === 0) {
    mainArea.innerHTML = buildEmpty('⚙️', 'Timetable Not Set Up', 'This class does not have a timetable configured yet.');
    return;
  }

  var slotMap = {};
  Object.keys(grouped).forEach(function (day) {
    grouped[day].forEach(function (slot) {
      slotMap[day + '_' + slot.period] = slot;
    });
  });

  var headerCols = '<th class="period-col">Period / Time</th>' +
    DAYS.map(function (d) { return '<th>' + d.label + '</th>'; }).join('');

  var bodyRows = periods.map(function (p) {
    var cells = DAYS.map(function (d) {
      var slot = slotMap[d.key + '_' + p.period];

      if (p.isBreak) {
        return '<td><div class="tt-cell is-break"><div class="tt-cell-break-label">' + esc(p.label) + '</div></div></td>';
      }

      if (slot && slot.subjectName) {
        return '<td><div class="tt-cell" style="border-left:3px solid ' + (slot.color || primary) + ';">' +
          '<div class="tt-cell-subject">' + esc(slot.subjectName) + '</div>' +
          (slot.teacherName ? '<div class="tt-cell-teacher">' + esc(slot.teacherName) + '</div>' : '') +
          (slot.room ? '<div class="tt-cell-room">📍 ' + esc(slot.room) + '</div>' : '') +
        '</div></td>';
      }

      return '<td><div class="tt-cell"><div class="tt-cell-empty">Free</div></div></td>';
    }).join('');

    return '<tr><td><div class="tt-period-label">' + esc(p.label) +
      '<div class="tt-period-time">' + esc(p.startTime || '') + (p.endTime ? ' – ' + esc(p.endTime) : '') + '</div>' +
    '</div></td>' + cells + '</tr>';
  }).join('');

  mainArea.innerHTML =
    '<div class="grid-wrap"><table class="tt-grid">' +
      '<thead><tr>' + headerCols + '</tr></thead>' +
      '<tbody>' + bodyRows + '</tbody>' +
    '</table></div>';
}

function buildEmpty(icon, title, sub) {
  return '<div class="empty">' +
    '<div class="empty-icon">' + icon + '</div>' +
    '<div class="empty-title">' + esc(title) + '</div>' +
    '<div class="empty-sub">' + esc(sub) + '</div>' +
  '</div>';
}

function showError(icon, title, sub) {
  document.getElementById('headerArea').innerHTML = '';
  document.getElementById('mainArea').innerHTML = buildEmpty(icon, title, sub);
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
