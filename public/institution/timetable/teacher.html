<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Timetable — LatLomp Institution</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --primary:#6c63ff; --pd:#574fd6; --green:#43e97b; --red:#ff6584;
      --orange:#ffa500;
      --dark:#0f0f1a;   --dark-2:#1a1a2e;
      --border:rgba(255,255,255,0.08);
      --text:#fff; --muted:#6b6b8a; --secondary:#a0a0c0;
    }
    html, body { margin:0; padding:0; background:var(--dark); color:var(--text); font-family:'Inter',sans-serif; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .topbar { position:sticky; top:0; z-index:300; background:var(--dark-2); border-bottom:1px solid var(--border); height:60px; display:flex; align-items:center; padding:0 24px; gap:16px; }
    .topbar-brand { font-size:15px; font-weight:800; color:#fff; white-space:nowrap; }
    .topbar-back  { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--secondary); font-size:13px; font-weight:600; text-decoration:none; margin-left:auto; white-space:nowrap; }
    .topbar-back:hover { color:#fff; background:rgba(255,255,255,0.1); }

    .main { max-width:1200px; margin:0 auto; padding:28px 24px 60px; }
    @media (max-width:700px) { .main { padding:18px 14px 48px; } }

    .page-header { margin-bottom:22px; }
    .page-header h1 { font-size:22px; font-weight:800; color:#fff; margin:0 0 4px; }
    .page-header p  { font-size:13px; color:var(--muted); margin:0; }

    .card { background:var(--dark-2); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:20px; }
    .card-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
    .card-head h3 { font-size:15px; font-weight:700; color:#fff; margin:0; }

    .grid-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .tt-grid { border-collapse:collapse; width:100%; min-width:780px; }
    .tt-grid th { padding:10px 8px; text-align:center; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); background:rgba(255,255,255,0.02); border:1px solid var(--border); white-space:nowrap; }
    .tt-grid th.period-col { text-align:left; padding-left:14px; width:130px; }
    .tt-grid td { border:1px solid var(--border); padding:0; vertical-align:top; height:64px; }
    .tt-period-label { padding:8px 12px; font-size:12px; font-weight:700; color:#fff; background:rgba(255,255,255,0.03); white-space:nowrap; }
    .tt-period-time  { font-size:10px; color:var(--muted); font-weight:400; margin-top:1px; }
    .tt-cell { width:100%; height:100%; min-height:64px; padding:6px 8px; }
    .tt-cell.is-break { background:repeating-linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 6px, transparent 6px, transparent 12px); }
    .tt-cell-subject { font-size:12px; font-weight:800; color:#fff; line-height:1.3; margin-bottom:2px; }
    .tt-cell-class    { font-size:10px; color:#a78bfa; font-weight:700; }
    .tt-cell-room     { font-size:10px; color:var(--muted); margin-top:1px; }
    .tt-cell-break-label { font-size:11px; color:var(--muted); font-style:italic; display:flex; align-items:center; justify-content:center; height:100%; }
    .tt-cell-empty    { font-size:11px; color:var(--muted); opacity:0.4; display:flex; align-items:center; justify-content:center; height:100%; }

    .spinner { width:28px; height:28px; border:3px solid rgba(255,255,255,0.2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:40px auto; display:block; }

    .empty { text-align:center; padding:48px 20px; }
    .empty-icon  { font-size:48px; margin-bottom:12px; }
    .empty-title { font-size:15px; font-weight:700; color:var(--secondary); margin-bottom:8px; }
    .empty-sub   { font-size:13px; color:var(--muted); line-height:1.7; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">📅 My Timetable</div>
  <a class="topbar-back" href="/institution/teacher/dashboard.html">&larr; Dashboard</a>
</div>

<div class="main">
  <div class="page-header">
    <h1>My Weekly Timetable</h1>
    <p>All your scheduled classes across the week</p>
  </div>

  <div id="content">
    <div class="spinner"></div>
  </div>
</div>

<script src="/institution/js/inst.api.js"></script>
<script>
/* ============================================
   ✅ PHASE N STAGE 3: TEACHER TIMETABLE VIEW
   Read-only weekly grid showing all periods
   where the logged-in teacher is assigned,
   across all classes.
============================================ */

var DAYS = [
  { key: 'monday',    label: 'Mon' },
  { key: 'tuesday',   label: 'Tue' },
  { key: 'wednesday', label: 'Wed' },
  { key: 'thursday',  label: 'Thu' },
  { key: 'friday',    label: 'Fri' },
  { key: 'saturday',  label: 'Sat' }
];

document.addEventListener('DOMContentLoaded', async function () {
  if (!instRequireAuth()) { return; }
  var user = instGetUser();
  if (!user) { return; }
  await loadTimetable(user._id);
});

async function loadTimetable(teacherId) {
  var content = document.getElementById('content');

  var [slotsRes, periodsRes] = await Promise.all([
    instApi('/timetable/teacher/' + teacherId),
    instApi('/timetable/periods')
  ]);

  if (!slotsRes.ok) {
    content.innerHTML = buildEmpty('⚠️', 'Failed to load timetable', esc((slotsRes.data && slotsRes.data.message) || 'Unknown error'));
    return;
  }

  var grouped = slotsRes.data.grouped || {};
  var total   = slotsRes.data.total   || 0;
  var periods = periodsRes.ok ? (periodsRes.data.periods || []) : [];

  if (total === 0) {
    content.innerHTML = buildEmpty('📅', 'No classes scheduled yet', 'Your school admin has not assigned you to any timetable slots yet.');
    return;
  }

  if (periods.length === 0) {
    content.innerHTML = buildEmpty('⚙️', 'Timetable not configured', 'Your school admin needs to set up period times first.');
    return;
  }

  /* Build slot lookup by period+day */
  var slotMap = {};
  Object.keys(grouped).forEach(function (day) {
    grouped[day].forEach(function (slot) {
      slotMap[day + '_' + slot.period] = slot;
    });
  });

  var headerCols = '<th class="period-col">Period / Time</th>' +
    DAYS.map(function (d) { return '<th>' + d.label + '</th>'; }).join('');

  var bodyRows = periods.map(function (p) {
    var cells = DAYS.map(function (d) {
      var slot = slotMap[d.key + '_' + p.period];

      if (p.isBreak) {
        return '<td><div class="tt-cell is-break"><div class="tt-cell-break-label">' + esc(p.label) + '</div></div></td>';
      }

      if (slot) {
        var subjName = (slot.subjectId && slot.subjectId.name) || slot.subjectName || 'Untitled';
        var clsName  = (slot.classId && slot.classId.name) || '';
        var color    = slot.color || '#6c63ff';
        return '<td><div class="tt-cell" style="border-left:3px solid ' + color + ';">' +
          '<div class="tt-cell-subject">' + esc(subjName) + '</div>' +
          (clsName ? '<div class="tt-cell-class">' + esc(clsName) + '</div>' : '') +
          (slot.room ? '<div class="tt-cell-room">📍 ' + esc(slot.room) + '</div>' : '') +
        '</div></td>';
      }

      return '<td><div class="tt-cell"><div class="tt-cell-empty">Free</div></div></td>';
    }).join('');

    return '<tr><td><div class="tt-period-label">' + esc(p.label) +
      '<div class="tt-period-time">' + esc(p.startTime || '') + (p.endTime ? ' – ' + esc(p.endTime) : '') + '</div>' +
    '</div></td>' + cells + '</tr>';
  }).join('');

  content.innerHTML =
    '<div class="card">' +
      '<div class="card-head"><h3>Weekly Schedule</h3>' +
        '<span style="font-size:12px; color:var(--muted);">' + total + ' period' + (total !== 1 ? 's' : '') + ' scheduled</span>' +
      '</div>' +
      '<div class="grid-wrap"><table class="tt-grid">' +
        '<thead><tr>' + headerCols + '</tr></thead>' +
        '<tbody>' + bodyRows + '</tbody>' +
      '</table></div>' +
    '</div>';
}

function buildEmpty(icon, title, sub) {
  return '<div class="card"><div style="padding:20px;"><div class="empty">' +
    '<div class="empty-icon">' + icon + '</div>' +
    '<div class="empty-title">' + esc(title) + '</div>' +
    '<div class="empty-sub">' + esc(sub) + '</div>' +
  '</div></div></div>';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
