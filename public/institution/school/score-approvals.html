<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Score Approvals — LatLomp Institution</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --primary:#6c63ff; --pd:#574fd6; --green:#43e97b; --red:#ff6584;
      --orange:#ffa500;
      --dark:#0f0f1a; --dark-2:#1a1a2e;
      --border:rgba(255,255,255,0.08);
      --text:#fff; --muted:#6b6b8a; --secondary:#a0a0c0;
    }
    html, body { margin:0; padding:0; background:var(--dark); color:var(--text); font-family:'Inter',sans-serif; }
    @keyframes spin   { to { transform:rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .topbar { position:sticky; top:0; z-index:300; background:var(--dark-2); border-bottom:1px solid var(--border); height:60px; display:flex; align-items:center; padding:0 24px; gap:16px; }
    .topbar-brand { font-size:15px; font-weight:800; color:#fff; }
    .topbar-back  { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--secondary); font-size:13px; font-weight:600; text-decoration:none; transition:all 0.2s; margin-left:auto; white-space:nowrap; }
    .topbar-back:hover { color:#fff; background:rgba(255,255,255,0.1); }

    .main { max-width:1100px; margin:0 auto; padding:28px 24px 60px; }
    @media (max-width:700px) { .main { padding:18px 14px 48px; } }

    .page-header { margin-bottom:22px; animation:fadeUp 0.3s ease; }
    .page-header h1 { font-size:22px; font-weight:800; color:#fff; margin:0 0 4px; }
    .page-header p  { font-size:13px; color:var(--muted); margin:0; }

    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
    @media (max-width:800px) { .stats-grid { grid-template-columns:1fr 1fr; } }
    @media (max-width:480px) { .stats-grid { grid-template-columns:1fr; } }

    .stat-card { background:var(--dark-2); border:1px solid var(--border); border-radius:14px; padding:18px; display:flex; align-items:center; gap:14px; }
    .stat-icon { font-size:18px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:10px; flex-shrink:0; }
    .stat-val  { font-size:24px; font-weight:900; color:#fff; line-height:1; margin-bottom:3px; }
    .stat-lbl  { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }

    .card { background:var(--dark-2); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:20px; }
    .card-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
    .card-head h3 { font-size:15px; font-weight:700; color:#fff; margin:0; }

    .tabs { display:flex; gap:4px; background:rgba(255,255,255,0.04); border-radius:10px; padding:4px; margin-bottom:20px; flex-wrap:wrap; }
    .tab  { flex:1; min-width:80px; padding:9px 14px; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; background:transparent; color:var(--secondary); white-space:nowrap; }
    .tab.active { background:linear-gradient(135deg,var(--primary),var(--pd)); color:#fff; }

    .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; border:none; transition:all 0.2s; white-space:nowrap; }
    .btn-green   { background:linear-gradient(135deg,var(--green),#38f9d7); color:#0f0f1a; }
    .btn-green:hover  { transform:translateY(-1px); box-shadow:0 4px 14px rgba(67,233,123,0.35); }
    .btn-danger  { background:rgba(255,101,132,0.12); border:1px solid rgba(255,101,132,0.3); color:var(--red); }
    .btn-danger:hover { background:rgba(255,101,132,0.22); }
    .btn-purple  { background:rgba(108,99,255,0.15); border:1px solid rgba(108,99,255,0.3); color:#a78bfa; }
    .btn-purple:hover { background:rgba(108,99,255,0.25); }
    .btn-muted   { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--secondary); }
    .btn-muted:hover { color:#fff; background:rgba(255,255,255,0.1); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-pending  { background:rgba(255,165,0,0.12);   color:var(--orange); }
    .badge-approved { background:rgba(67,233,123,0.12);  color:var(--green); }
    .badge-rejected { background:rgba(255,101,132,0.12); color:var(--red); }
    .badge-released { background:rgba(108,99,255,0.12);  color:#a78bfa; }
    .badge-muted    { background:rgba(255,255,255,0.06); color:var(--secondary); }

    .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .sub-table { width:100%; border-collapse:collapse; min-width:700px; }
    .sub-table th { padding:10px 14px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); white-space:nowrap; }
    .sub-table td { padding:11px 14px; font-size:13px; color:var(--secondary); border-bottom:1px solid var(--border); vertical-align:middle; }
    .sub-table tr:last-child td { border-bottom:none; }
    .sub-table tr:hover td { background:rgba(255,255,255,0.02); }
    .sub-name { font-weight:700; color:#fff; }
    .sub-meta { font-size:11px; color:var(--muted); margin-top:2px; }

    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }

    /* ---- REJECT MODAL ---- */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:600; display:none; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.active { display:flex; }
    .modal-box { background:var(--dark-2); border:1px solid var(--border); border-radius:18px; padding:28px; width:100%; max-width:460px; animation:fadeUp 0.2s ease; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .modal-header h2 { font-size:17px; font-weight:800; color:#fff; margin:0; }
    .modal-close { width:30px; height:30px; border-radius:7px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--muted); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; font-family:inherit; transition:all 0.2s; }
    .modal-close:hover { background:rgba(255,101,132,0.15); color:var(--red); }
    .modal-field { margin-bottom:16px; }
    .modal-field label { display:block; font-size:11px; font-weight:700; color:var(--secondary); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:7px; }
    .modal-field textarea { width:100%; min-height:100px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:9px; padding:11px 13px; color:#fff; font-size:13px; font-family:inherit; outline:none; resize:vertical; transition:border-color 0.2s; }
    .modal-field textarea:focus { border-color:var(--red); }
    .modal-footer { display:flex; justify-content:flex-end; gap:10px; padding-top:14px; border-top:1px solid var(--border); }

    .toast { position:fixed; bottom:24px; right:24px; background:var(--dark-2); border:1px solid var(--border); border-radius:10px; padding:13px 18px; font-size:13px; font-weight:600; color:#fff; z-index:9999; box-shadow:0 8px 32px rgba(0,0,0,0.4); max-width:300px; display:none; }
    @media (max-width:600px) { .toast { bottom:12px; right:12px; left:12px; max-width:none; } }

    .empty { text-align:center; padding:48px 20px; }
    .empty-icon  { font-size:48px; margin-bottom:12px; }
    .empty-title { font-size:15px; font-weight:700; color:var(--secondary); margin-bottom:8px; }
    .empty-sub   { font-size:13px; color:var(--muted); line-height:1.7; }

    .pagination { display:flex; justify-content:center; gap:8px; padding:16px; flex-wrap:wrap; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">✅ Score Approvals</div>
  <a class="topbar-back" href="/institution/school/dashboard.html">&larr; Dashboard</a>
</div>

<div class="main">

  <div class="page-header">
    <h1>Score Approvals</h1>
    <p>Review, approve, reject and release teacher score submissions</p>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(255,165,0,0.1);">⏳</div>
      <div><div class="stat-val" id="statPending">—</div><div class="stat-lbl">Pending Review</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(67,233,123,0.1);">✅</div>
      <div><div class="stat-val" id="statApproved">—</div><div class="stat-lbl">Approved</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(255,101,132,0.1);">❌</div>
      <div><div class="stat-val" id="statRejected">—</div><div class="stat-lbl">Rejected</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(108,99,255,0.1);">👁</div>
      <div><div class="stat-val" id="statReleased">—</div><div class="stat-lbl">Released</div></div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="tabs">
    <button class="tab active" id="tabAll"      onclick="setTab('all',this)">All</button>
    <button class="tab"         id="tabPending"  onclick="setTab('pending',this)">⏳ Pending</button>
    <button class="tab"         id="tabApproved" onclick="setTab('approved',this)">✅ Approved</button>
    <button class="tab"         id="tabRejected" onclick="setTab('rejected',this)">❌ Rejected</button>
  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="card-head">
      <h3>Submissions</h3>
      <button class="btn btn-muted" onclick="loadSubmissions()">↻ Refresh</button>
    </div>
    <div class="table-wrap">
      <table class="sub-table">
        <thead>
          <tr>
            <th>Class</th>
            <th>Subject</th>
            <th>Term</th>
            <th>Teacher</th>
            <th>Scores</th>
            <th>Submitted</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="subTableBody">
          <tr><td colspan="8" style="text-align:center; padding:32px; color:var(--muted);">Loading submissions...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<!-- REJECT MODAL -->
<div class="modal-overlay" id="rejectModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>❌ Reject Submission</h2>
      <button class="modal-close" onclick="closeRejectModal()">✕</button>
    </div>
    <input type="hidden" id="rejectSubId" />
    <div style="font-size:13px; color:var(--secondary); margin-bottom:16px;">
      Rejecting: <strong id="rejectSubLabel">—</strong>
    </div>
    <div class="modal-field">
      <label>Reason for Rejection *</label>
      <textarea id="rejectReason" placeholder="Explain what needs to be corrected..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-muted" onclick="closeRejectModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmReject()">❌ Reject Submission</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/institution/js/inst.api.js"></script>
<script>
/* ============================================
   ✅ PHASE L.7: SCORE APPROVALS PAGE
   School admin reviews teacher score submissions.
   Actions: Approve, Reject (with reason),
   Release to students, Revoke release.
============================================ */

var _currentTab  = 'all';
var _currentPage = 1;

document.addEventListener('DOMContentLoaded', async function () {
  if (!instRequireAuth('school_admin')) { return; }
  await Promise.all([ loadStats(), loadSubmissions() ]);
});

/* ============================================ STATS */
async function loadStats() {
  try {
    var [allRes, approvedRes, rejectedRes, releasedRes] = await Promise.all([
      instApi('/score/submissions?status=all&limit=1'),
      instApi('/score/submissions?status=approved&limit=1'),
      instApi('/score/submissions?status=rejected&limit=1'),
      instApi('/score/submissions?status=approved&limit=100')
    ]);

    setText('statPending',  allRes.ok      ? (allRes.data.total || 0) : '—');
    setText('statApproved', approvedRes.ok ? (approvedRes.data.total || 0) : '—');
    setText('statRejected', rejectedRes.ok ? (rejectedRes.data.total || 0) : '—');

    /* Count released submissions */
    var released = 0;
    if (releasedRes.ok) {
      (releasedRes.data.submissions || []).forEach(function(s) {
        if (s.releasedToStudents) { released++; }
      });
    }
    setText('statReleased', released);

    /* Override pending stat to show only pending submissions */
    var pendingRes = await instApi('/score/submissions?status=pending&limit=1');
    if (pendingRes.ok) { setText('statPending', pendingRes.data.total || 0); }
  } catch(e) { /* silent */ }
}

/* ============================================ SET TAB */
function setTab(tab, el) {
  _currentTab  = tab;
  _currentPage = 1;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  if (el) { el.classList.add('active'); }
  loadSubmissions();
}

/* ============================================ LOAD TABLE */
async function loadSubmissions() {
  var tbody = document.getElementById('subTableBody');
  if (!tbody) { return; }
  tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:24px; color:var(--muted);"><span class="spinner" style="width:24px; height:24px; border-width:3px; margin-right:10px;"></span>Loading...</td></tr>';

  var params = '?status=' + _currentTab + '&page=' + _currentPage + '&limit=15';
  var res    = await instApi('/score/submissions' + params);

  if (!res.ok) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:24px; color:var(--red);">Failed to load. ' + esc((res.data && res.data.message) || '') + '</td></tr>';
    return;
  }

  var submissions = res.data.submissions || [];
  var pages       = res.data.pages || 1;

  if (!submissions.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty">' +
      '<div class="empty-icon">' + (_currentTab === 'pending' ? '⏳' : '📋') + '</div>' +
      '<div class="empty-title">' + (_currentTab === 'pending' ? 'No pending submissions' : 'No submissions found') + '</div>' +
      '<div class="empty-sub">' + (_currentTab === 'pending' ? 'Teachers have not submitted any scores for review yet.' : 'Try a different filter.') + '</div>' +
    '</div></td></tr>';
    buildPagination(1, 1);
    return;
  }

  tbody.innerHTML = submissions.map(function(s) {
    var className   = (s.classId   && s.classId.name)   ? esc(s.classId.name)   : '—';
    var subjectName = (s.subjectId && s.subjectId.name) ? esc(s.subjectId.name) : '—';
    var termName    = s.termId
      ? esc((s.termId.name || '') + (s.termId.session ? ' — ' + s.termId.session : ''))
      : '—';
    var teacherName  = (s.submittedBy && s.submittedBy.name) ? esc(s.submittedBy.name) : 'Unknown';
    var submittedAt  = s.submittedAt ? new Date(s.submittedAt).toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' }) : '—';

    var statusBadge = s.status === 'pending'
      ? '<span class="badge badge-pending">⏳ Pending</span>'
      : s.status === 'approved'
        ? '<span class="badge badge-approved">✅ Approved</span>' +
          (s.releasedToStudents ? ' <span class="badge badge-released" style="margin-left:4px;">👁 Released</span>' : '')
        : '<span class="badge badge-rejected">❌ Rejected</span>';

    var safeName = esc(className + ' / ' + subjectName);

    var actions = '';
    if (s.status === 'pending') {
      actions =
        '<button class="btn btn-green" style="margin-bottom:4px;" onclick="approveSubmission(\'' + s._id + '\',\'' + safeName + '\')">✅ Approve</button> ' +
        '<button class="btn btn-danger" onclick="openRejectModal(\'' + s._id + '\',\'' + safeName + '\')">❌ Reject</button>';
    } else if (s.status === 'approved') {
      var releaseLabel  = s.releasedToStudents ? '🔒 Revoke Release' : '🔓 Release to Students';
      var releaseClass  = s.releasedToStudents ? 'btn btn-danger' : 'btn btn-purple';
      actions = '<button class="' + releaseClass + '" onclick="toggleRelease(\'' + s._id + '\',\'' + safeName + '\')">' + releaseLabel + '</button>';
    } else {
      /* rejected — view only */
      actions = '<span style="font-size:12px; color:var(--muted);">Awaiting resubmission</span>';
    }

    /* Show rejection reason inline if rejected */
    var extraRow = '';
    if (s.status === 'rejected' && s.rejectionReason) {
      extraRow = '<div style="font-size:11px; color:var(--red); margin-top:4px;">Reason: ' + esc(s.rejectionReason) + '</div>';
    }

    return '<tr>' +
      '<td><div class="sub-name">' + className + '</div></td>' +
      '<td>' + subjectName + '</td>' +
      '<td style="font-size:12px;">' + termName + '</td>' +
      '<td>' +
        '<div style="font-weight:600; color:#fff;">' + teacherName + '</div>' +
        '<div class="sub-meta">' + (s.submittedBy && s.submittedBy.email ? esc(s.submittedBy.email) : '') + '</div>' +
      '</td>' +
      '<td style="text-align:center; font-weight:700; color:#fff;">' + (s.scoreCount || 0) + '</td>' +
      '<td style="font-size:12px;">' + submittedAt + '</td>' +
      '<td>' + statusBadge + extraRow + '</td>' +
      '<td><div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">' + actions + '</div></td>' +
    '</tr>';
  }).join('');

  buildPagination(pages, _currentPage);
}

function buildPagination(pages, current) {
  var el = document.getElementById('pagination');
  if (!el) { return; }
  if (pages <= 1) { el.innerHTML = ''; return; }
  var html = '';
  for (var p = 1; p <= pages; p++) {
    html += '<button class="btn ' + (p === current ? 'btn-purple' : 'btn-muted') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  }
  el.innerHTML = html;
}

function goPage(p) { _currentPage = p; loadSubmissions(); }

/* ============================================ APPROVE */
async function approveSubmission(id, label) {
  if (!confirm('Approve scores for "' + label + '"?\n\nScores will be locked. Teachers cannot edit them after approval.')) { return; }
  var res = await instApi('/score/submissions/' + id + '/approve', 'PUT');
  if (res.ok) {
    showToast('✅ Submission approved. Scores are now locked.', 'success');
    await Promise.all([ loadStats(), loadSubmissions() ]);
  } else {
    showToast((res.data && res.data.message) || 'Approval failed.', 'error');
  }
}

/* ============================================ REJECT MODAL */
function openRejectModal(id, label) {
  document.getElementById('rejectSubId').value   = id;
  document.getElementById('rejectSubLabel').textContent = label;
  document.getElementById('rejectReason').value  = '';
  document.getElementById('rejectModal').classList.add('active');
  setTimeout(function() { document.getElementById('rejectReason').focus(); }, 100);
}

function closeRejectModal() {
  document.getElementById('rejectModal').classList.remove('active');
}

async function confirmReject() {
  var id     = document.getElementById('rejectSubId').value;
  var reason = document.getElementById('rejectReason').value.trim();
  if (!reason) {
    document.getElementById('rejectReason').focus();
    document.getElementById('rejectReason').style.borderColor = 'var(--red)';
    return;
  }
  var res = await instApi('/score/submissions/' + id + '/reject', 'PUT', { reason: reason });
  if (res.ok) {
    closeRejectModal();
    showToast('❌ Submission rejected. Teacher has been notified to revise.', 'warning');
    await Promise.all([ loadStats(), loadSubmissions() ]);
  } else {
    showToast((res.data && res.data.message) || 'Rejection failed.', 'error');
  }
}

/* ============================================ RELEASE */
async function toggleRelease(id, label) {
  var res = await instApi('/score/submissions/' + id + '/release', 'PUT');
  if (res.ok) {
    var msg = res.data.releasedToStudents
      ? '👁 Scores released to students.'
      : '🔒 Score visibility revoked.';
    showToast(msg, 'success');
    loadSubmissions();
  } else {
    showToast((res.data && res.data.message) || 'Failed.', 'error');
  }
}

/* ============================================ HELPERS */
function setText(id, val) {
  var el = document.getElementById(id);
  if (el) { el.textContent = val; }
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  if (!t) { return; }
  t.textContent   = msg;
  t.style.display = 'block';
  t.style.borderColor = type === 'success' ? 'rgba(67,233,123,0.4)'
    : type === 'error'   ? 'rgba(255,101,132,0.4)'
    : type === 'warning' ? 'rgba(255,165,0,0.4)'
    : 'var(--border)';
  t.style.color = type === 'success' ? 'var(--green)'
    : type === 'error' ? 'var(--red)'
    : type === 'warning' ? 'var(--orange)'
    : '#fff';
  clearTimeout(t._to);
  t._to = setTimeout(function() { t.style.display = 'none'; }, 4000);
}
</script>
</body>
</html>
