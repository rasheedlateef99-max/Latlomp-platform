<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Score Entry — LatLomp Institution</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --primary:#6c63ff; --pd:#574fd6; --green:#43e97b; --red:#ff6584;
      --orange:#ffa500;  --yellow:#ffd600;
      --dark:#0f0f1a;    --dark-2:#1a1a2e;
      --border:rgba(255,255,255,0.08);
      --text:#fff;       --muted:#6b6b8a; --secondary:#a0a0c0;
    }
    html, body { margin:0; padding:0; background:var(--dark); color:var(--text); font-family:'Inter',sans-serif; }
    @keyframes spin   { to { transform:rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .topbar { position:sticky; top:0; z-index:300; background:var(--dark-2); border-bottom:1px solid var(--border); height:60px; display:flex; align-items:center; padding:0 24px; gap:16px; }
    .topbar-brand { font-size:15px; font-weight:800; color:#fff; white-space:nowrap; }
    .topbar-back  { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--secondary); font-size:13px; font-weight:600; text-decoration:none; transition:all 0.2s; margin-left:auto; white-space:nowrap; }
    .topbar-back:hover { color:#fff; background:rgba(255,255,255,0.1); }

    .main { max-width:1200px; margin:0 auto; padding:28px 24px 60px; }
    @media (max-width:700px) { .main { padding:18px 14px 48px; } }

    .page-header { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:22px; animation:fadeUp 0.3s ease; }
    .page-header h1 { font-size:22px; font-weight:800; color:#fff; margin:0 0 4px; }
    .page-header p  { font-size:13px; color:var(--muted); margin:0; }

    .card { background:var(--dark-2); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:20px; }
    .card-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
    .card-head h3 { font-size:15px; font-weight:700; color:#fff; margin:0; }
    .card-body { padding:20px; }

    .selector-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
    @media (max-width:800px) { .selector-grid { grid-template-columns:1fr 1fr; } }
    @media (max-width:500px) { .selector-grid { grid-template-columns:1fr; } }

    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:12px; font-weight:700; color:var(--secondary); text-transform:uppercase; letter-spacing:0.4px; }
    .sel { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:9px; padding:11px 13px; color:#fff; font-size:14px; font-family:inherit; outline:none; width:100%; transition:border-color 0.2s; }
    .sel:focus { border-color:var(--primary); }
    .sel option { background:var(--dark-2); }
    .sel:disabled { opacity:0.5; cursor:not-allowed; }

    .btn { display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; border:none; transition:all 0.2s; text-decoration:none; white-space:nowrap; }
    .btn-primary   { background:linear-gradient(135deg,var(--primary),var(--pd)); color:#fff; }
    .btn-primary:hover  { transform:translateY(-1px); box-shadow:0 4px 16px rgba(108,99,255,0.4); }
    .btn-green     { background:linear-gradient(135deg,var(--green),#38f9d7); color:#0f0f1a; }
    .btn-green:hover    { transform:translateY(-1px); box-shadow:0 4px 16px rgba(67,233,123,0.35); }
    .btn-danger    { background:rgba(255,101,132,0.12); border:1px solid rgba(255,101,132,0.35); color:var(--red); }
    .btn-danger:hover   { background:rgba(255,101,132,0.22); }
    .btn-secondary { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--secondary); }
    .btn-secondary:hover { color:#fff; background:rgba(255,255,255,0.1); }
    .btn-sm { padding:6px 12px; font-size:12px; border-radius:7px; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-green  { background:rgba(67,233,123,0.12);  color:var(--green); }
    .badge-red    { background:rgba(255,101,132,0.12); color:var(--red); }
    .badge-orange { background:rgba(255,165,0,0.12);   color:var(--orange); }
    .badge-purple { background:rgba(108,99,255,0.12);  color:#a78bfa; }
    .badge-muted  { background:rgba(255,255,255,0.06); color:var(--secondary); }

    /* ---- SUBMISSION STATUS BANNER ---- */
    .sub-banner { border-radius:10px; padding:13px 18px; font-size:13px; line-height:1.6; margin-bottom:16px; border:1px solid; }
    .sub-draft    { background:rgba(255,255,255,0.03); border-color:var(--border);                    color:var(--secondary); }
    .sub-pending  { background:rgba(255,165,0,0.07);   border-color:rgba(255,165,0,0.3);              color:var(--orange); }
    .sub-approved { background:rgba(67,233,123,0.07);  border-color:rgba(67,233,123,0.25);            color:var(--green); }
    .sub-rejected { background:rgba(255,101,132,0.07); border-color:rgba(255,101,132,0.3);            color:var(--red); }
    .sub-banner strong { color:#fff; }

    /* ---- SCORE TABLE ---- */
    .score-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .score-table { width:100%; border-collapse:collapse; min-width:700px; }
    .score-table th { padding:10px 12px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); white-space:nowrap; }
    .score-table th.comp-header { text-align:center; }
    .score-table td { padding:8px 10px; font-size:13px; color:var(--secondary); border-bottom:1px solid var(--border); vertical-align:middle; }
    .score-table tr:last-child td { border-bottom:none; }
    .score-table tr:hover td { background:rgba(255,255,255,0.015); }

    .score-input { width:64px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:7px; padding:6px 8px; color:#fff; font-size:13px; font-family:inherit; outline:none; text-align:center; transition:border-color 0.2s; }
    .score-input:focus { border-color:var(--primary); background:rgba(108,99,255,0.08); }
    .score-input.over-max { border-color:var(--red) !important; background:rgba(255,101,132,0.08); }
    .score-input:disabled { opacity:0.55; cursor:not-allowed; background:rgba(255,255,255,0.02); border-color:var(--border); }

    .total-cell { font-weight:800; font-size:14px; color:#fff; text-align:center; }
    .pct-cell   { font-size:12px; text-align:center; }
    .grade-cell { text-align:center; }
    .pos-cell   { font-weight:700; font-size:13px; color:#a78bfa; text-align:center; }
    .student-name { font-weight:700; color:#fff; }
    .student-code { font-size:11px; color:var(--muted); }
    .max-hint { font-size:10px; color:var(--muted); display:block; text-align:center; margin-top:2px; }

    .empty { text-align:center; padding:48px 20px; }
    .empty-icon  { font-size:48px; margin-bottom:12px; }
    .empty-title { font-size:15px; font-weight:700; color:var(--secondary); margin-bottom:8px; }
    .empty-sub   { font-size:13px; color:var(--muted); line-height:1.7; }
    .empty-sub a { color:var(--primary); text-decoration:none; }
    .empty-sub a:hover { text-decoration:underline; }

    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }

    .info-banner { background:rgba(108,99,255,0.08); border:1px solid rgba(108,99,255,0.2); border-radius:10px; padding:14px 18px; font-size:13px; color:#a78bfa; line-height:1.6; margin-bottom:16px; }
    .info-banner strong { color:#fff; }

    .save-bar { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; padding:16px 20px; border-top:1px solid var(--border); background:var(--dark-2); }
    .save-bar-left { font-size:13px; color:var(--muted); }
    .save-bar-left strong { color:#fff; }

    .result-summary { background:rgba(67,233,123,0.06); border:1px solid rgba(67,233,123,0.2); border-radius:10px; padding:14px 18px; font-size:13px; color:var(--green); line-height:1.6; margin-bottom:16px; display:none; }
    .error-summary  { background:rgba(255,101,132,0.08); border:1px solid rgba(255,101,132,0.25); border-radius:10px; padding:14px 18px; font-size:13px; color:var(--red); line-height:1.6; margin-bottom:16px; display:none; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">📊 Score Entry</div>
  <a class="topbar-back" href="/institution/teacher/dashboard.html">&larr; Dashboard</a>
</div>

<div class="main">
  <div class="page-header">
    <div><h1>Score Entry</h1><p>Enter and manage student scores for a class, subject and term</p></div>
  </div>

  <div class="card">
    <div class="card-head"><h3>Select Class, Subject &amp; Term</h3></div>
    <div class="card-body">
      <div class="selector-grid">
        <div class="field">
          <label>Class</label>
          <select id="selClass" class="sel" onchange="onSelectorChange()">
            <option value="">-- Select Class --</option>
          </select>
        </div>
        <div class="field">
          <label>Subject</label>
          <select id="selSubject" class="sel" onchange="onSelectorChange()">
            <option value="">-- Select Subject --</option>
          </select>
        </div>
        <div class="field">
          <label>Term</label>
          <select id="selTerm" class="sel" onchange="onSelectorChange()">
            <option value="">-- Select Term --</option>
          </select>
        </div>
      </div>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="loadBtn" onclick="loadRoster()" disabled>Load Class Roster</button>
      </div>
    </div>
  </div>

  <div id="scoreArea"></div>
</div>

<script src="/institution/js/inst.api.js"></script>
<script>
/* ============================================
   ✅ PHASE L.5: Score Entry Page
   ✅ PHASE L.7: Approval Workflow added
   - Submission status loaded on roster load
   - Submit for Approval button
   - Inputs locked when approved
   - Rejection reason shown when rejected
============================================ */

var _classes      = [];
var _subjects     = [];
var _terms        = [];
var _config       = null;
var _roster       = [];
var _submission   = null;  /* ✅ L.7 */
var _academicYear = '';

document.addEventListener('DOMContentLoaded', async function () {
  if (!instRequireAuth()) { return; }
  await loadStructure();
});

async function loadStructure() {
  var area = document.getElementById('scoreArea');

  var [classRes, subjectRes, termRes] = await Promise.all([
    instApi('/structure/classes'),
    instApi('/structure/subjects'),
    instApi('/structure/terms')
  ]);

  _classes  = (classRes.ok   && classRes.data.classes)   ? classRes.data.classes   : [];
  _subjects = (subjectRes.ok && subjectRes.data.subjects) ? subjectRes.data.subjects : [];
  _terms    = (termRes.ok    && termRes.data.terms)       ? termRes.data.terms       : [];

  if (_classes.length === 0 || _subjects.length === 0 || _terms.length === 0) {
    area.innerHTML = buildEmptyState();
    return;
  }

  fillSelect('selClass',   _classes,  'name', '_id');
  fillSelect('selSubject', _subjects, 'name', '_id');
  fillSelect('selTerm',    _terms, function(t) {
    return (t.name || '') + (t.session ? ' — ' + t.session : '');
  }, '_id');

  var currentTerm = _terms.find(function (t) { return t.isCurrent; });
  if (currentTerm) {
    document.getElementById('selTerm').value = currentTerm._id;
    _academicYear = currentTerm.session || '';
  }

  area.innerHTML = buildPromptState();
  onSelectorChange();
}

function fillSelect(selectId, items, labelFn, valueKey) {
  var el = document.getElementById(selectId);
  if (!el) { return; }
  el.innerHTML = '<option value="">-- Select --</option>';
  items.forEach(function (item) {
    var label = typeof labelFn === 'function' ? labelFn(item) : item[labelFn];
    var opt   = document.createElement('option');
    opt.value       = item[valueKey];
    opt.textContent = label;
    el.appendChild(opt);
  });
}

function onSelectorChange() {
  var c = document.getElementById('selClass').value;
  var s = document.getElementById('selSubject').value;
  var t = document.getElementById('selTerm').value;
  document.getElementById('loadBtn').disabled = !(c && s && t);
  if (t) {
    var term = _terms.find(function (x) { return x._id === t; });
    _academicYear = term ? (term.session || '') : '';
  }
}

/* ============================================ LOAD ROSTER */
async function loadRoster() {
  var classId   = document.getElementById('selClass').value;
  var subjectId = document.getElementById('selSubject').value;
  var termId    = document.getElementById('selTerm').value;
  if (!classId || !subjectId || !termId) { return; }

  var area    = document.getElementById('scoreArea');
  var loadBtn = document.getElementById('loadBtn');
  loadBtn.innerHTML = '<span class="spinner"></span> Loading...';
  loadBtn.disabled  = true;

  /* ✅ L.7: Load roster AND submission status in parallel */
  var [rosterRes, subRes] = await Promise.all([
    instApi('/score/class/' + classId + '/subject/' + subjectId + '/term/' + termId),
    instApi('/score/submission-status/' + classId + '/' + subjectId + '/' + termId)
  ]);

  loadBtn.innerHTML = 'Load Class Roster';
  loadBtn.disabled  = false;

  if (!rosterRes.ok) {
    area.innerHTML = '<div class="card"><div class="card-body"><div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load roster</div><div class="empty-sub">' + esc((rosterRes.data && rosterRes.data.message) || 'Unknown error') + '</div></div></div></div>';
    return;
  }

  _config     = rosterRes.data.config;
  _roster     = rosterRes.data.roster || [];
  _submission = subRes.ok ? (subRes.data.submission || null) : null;  /* ✅ L.7 */

  if (_roster.length === 0) {
    area.innerHTML = '<div class="card"><div class="card-body"><div class="empty"><div class="empty-icon">🧑‍🎓</div><div class="empty-title">No students in this class</div><div class="empty-sub">Go to <a href="/institution/school/students.html">Students</a> and assign students to this class first.</div></div></div></div>';
    return;
  }

  renderScoreTable(classId, subjectId, termId);
}

/* ============================================
   ✅ L.7: BUILD SUBMISSION STATUS BANNER
============================================ */
function buildSubmissionBanner(classId, subjectId, termId) {
  if (!_submission) {
    return '<div class="sub-banner sub-draft">' +
      '<strong>📝 Draft</strong> — Scores have not been submitted for approval yet. ' +
      'Save scores first, then click <strong>Submit for Approval</strong>.' +
    '</div>';
  }

  var sub = _submission;
  var who = (sub.submittedBy && sub.submittedBy.name) ? sub.submittedBy.name : 'you';
  var when = sub.submittedAt ? new Date(sub.submittedAt).toDateString() : '';

  if (sub.status === 'pending') {
    return '<div class="sub-banner sub-pending">' +
      '<strong>⏳ Awaiting Approval</strong> — ' +
      sub.scoreCount + ' scores submitted by <strong>' + esc(who) + '</strong> on ' + esc(when) + '. ' +
      'Waiting for school admin review. You can still save changes and resubmit.' +
    '</div>';
  }

  if (sub.status === 'approved') {
    var releasedBadge = sub.releasedToStudents
      ? ' <span class="badge badge-green" style="vertical-align:middle; margin-left:6px;">👁 Released to Students</span>'
      : ' <span class="badge badge-muted" style="vertical-align:middle; margin-left:6px;">🔒 Not Yet Released</span>';
    return '<div class="sub-banner sub-approved">' +
      '<strong>✅ Approved</strong> — Scores are locked. Changes are not permitted. ' +
      'Contact your school admin if corrections are needed.' + releasedBadge +
    '</div>';
  }

  if (sub.status === 'rejected') {
    return '<div class="sub-banner sub-rejected">' +
      '<strong>❌ Rejected</strong> — Reason: <em>' + esc(sub.rejectionReason || 'No reason provided') + '</em>. ' +
      'Please revise the scores and click <strong>Resubmit for Approval</strong>.' +
    '</div>';
  }

  return '';
}

/* ============================================ RENDER TABLE */
function renderScoreTable(classId, subjectId, termId) {
  var area       = document.getElementById('scoreArea');
  var components = _config ? _config.components : [];
  components = components.slice().sort(function (a, b) { return (a.sortOrder||0) - (b.sortOrder||0); });

  var cls  = _classes.find(function(x)  { return x._id === classId;   });
  var subj = _subjects.find(function(x) { return x._id === subjectId; });
  var term = _terms.find(function(x)    { return x._id === termId;    });

  var contextLabel = [
    cls  ? cls.name  : '',
    subj ? subj.name : '',
    term ? (term.name + (term.session ? ' — ' + term.session : '')) : ''
  ].filter(Boolean).join(' / ');

  /* ✅ L.7: Determine locked state */
  var isApproved = _submission && _submission.status === 'approved';
  var isPending  = _submission && _submission.status === 'pending';
  var isRejected = _submission && _submission.status === 'rejected';

  var headerCols = '<th>Student</th>';
  components.forEach(function (comp) {
    headerCols += '<th class="comp-header">' + esc(comp.label) + '<span class="max-hint">/ ' + comp.maxScore + '</span></th>';
  });
  headerCols += '<th class="comp-header">Total</th><th class="comp-header">%</th><th class="comp-header">Grade</th><th class="comp-header">Position</th>';

  var rows = _roster.map(function (row, idx) {
    var existing       = row.score;
    var existingScores = {};
    if (existing && existing.scores) {
      var scoresObj = existing.scores;
      if (typeof scoresObj === 'object') {
        Object.keys(scoresObj).forEach(function (k) { existingScores[k] = scoresObj[k]; });
      }
    }

    /* ✅ L.7: Disabled when approved */
    var inputs = components.map(function (comp) {
      var val = existingScores[comp.key] !== undefined ? existingScores[comp.key] : '';
      return '<td class="comp-header"><input type="number" class="score-input" ' +
        'data-idx="' + idx + '" data-key="' + esc(comp.key) + '" data-max="' + comp.maxScore + '" ' +
        'value="' + val + '" min="0" max="' + comp.maxScore + '" ' +
        (isApproved ? 'disabled ' : 'oninput="onScoreInput(this)" ') +
        '/></td>';
    }).join('');

    var totalDisplay = existing ? (existing.total || 0)      : '—';
    var pctDisplay   = existing ? (existing.percentage || 0) + '%' : '—';
    var gradeDisplay = existing ? (existing.grade || '—')    : '—';
    var posDisplay   = existing && existing.position ? (existing.position + ' / ' + existing.positionOutOf) : '—';
    var pctColor     = '';
    if (existing) {
      var pct = existing.percentage || 0;
      pctColor = pct >= 75 ? 'color:var(--green);' : pct >= 50 ? 'color:var(--orange);' : 'color:var(--red);';
    }

    return '<tr id="srow_' + idx + '">' +
      '<td><div class="student-name">' + esc(row.name) + '</div>' +
      '<div class="student-code">' + esc(row.studentCode || row.admissionNo || '') + '</div></td>' +
      inputs +
      '<td class="total-cell" id="total_' + idx + '">' + totalDisplay + '</td>' +
      '<td class="pct-cell"   id="pct_'   + idx + '" style="' + pctColor + '">' + pctDisplay + '</td>' +
      '<td class="grade-cell" id="grade_' + idx + '"><span class="badge badge-muted" id="gradebadge_' + idx + '">' + gradeDisplay + '</span></td>' +
      '<td class="pos-cell"   id="pos_'   + idx + '">' + posDisplay + '</td>' +
    '</tr>';
  }).join('');

  /* ✅ L.7: Save bar adapts to submission state */
  var submitBtnLabel = isPending ? '↻ Resubmit' : (isRejected ? '📤 Resubmit for Approval' : '📤 Submit for Approval');
  var submitBtnClass = isRejected ? 'btn btn-danger' : 'btn btn-primary';

  var saveBtns = isApproved
    ? '<span class="badge badge-green" style="font-size:13px; padding:8px 16px;">✅ Scores Approved &amp; Locked</span>'
    : '<button class="btn btn-secondary btn-sm" onclick="clearAllScores()">Clear All</button>' +
      '<button class="btn btn-green" id="saveRankBtn" onclick="saveAndRank(\'' + classId + '\',\'' + subjectId + '\',\'' + termId + '\')">💾 Save &amp; Rank</button>' +
      '<button class="' + submitBtnClass + '" id="submitApprovalBtn" onclick="submitForApproval(\'' + classId + '\',\'' + subjectId + '\',\'' + termId + '\')">' + submitBtnLabel + '</button>';

  area.innerHTML =
    '<div class="info-banner">Editing scores for <strong>' + esc(contextLabel) + '</strong>. ' +
    'Totals and grades update live as you type.</div>' +
    buildSubmissionBanner(classId, subjectId, termId) +
    '<div id="resultSummary" class="result-summary"></div>' +
    '<div id="errorSummary"  class="error-summary"></div>' +
    '<div class="card">' +
      '<div class="card-head"><h3>Class Score Sheet</h3>' +
        '<span style="font-size:12px; color:var(--muted);">' + _roster.length + ' student' + (_roster.length !== 1 ? 's' : '') + '</span>' +
      '</div>' +
      '<div class="score-table-wrap">' +
        '<table class="score-table">' +
          '<thead><tr>' + headerCols + '</tr></thead>' +
          '<tbody id="scoreTableBody">' + rows + '</tbody>' +
        '</table>' +
      '</div>' +
      '<div class="save-bar">' +
        '<div class="save-bar-left">Academic Year: <strong>' + esc(_academicYear || '—') + '</strong></div>' +
        '<div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">' + saveBtns + '</div>' +
      '</div>' +
    '</div>';
}

/* ============================================ LIVE CALCULATION */
function onScoreInput(input) {
  var max = parseFloat(input.dataset.max);
  var val = parseFloat(input.value);
  if (!isNaN(val) && val > max) { input.classList.add('over-max'); }
  else { input.classList.remove('over-max'); }
  recalcRow(parseInt(input.dataset.idx));
}

function recalcRow(idx) {
  var components  = (_config ? _config.components : []).slice().sort(function (a,b) { return (a.sortOrder||0)-(b.sortOrder||0); });
  var total       = 0;
  var maxPossible = 0;
  var valid       = true;

  components.forEach(function (comp) {
    var input = document.querySelector('[data-idx="' + idx + '"][data-key="' + comp.key + '"]');
    if (!input) { return; }
    var val = input.value === '' ? 0 : parseFloat(input.value);
    if (isNaN(val) || val < 0 || val > comp.maxScore) { valid = false; return; }
    total       += val;
    maxPossible += comp.maxScore;
  });

  if (!valid || maxPossible === 0) {
    setCell('total_' + idx, '—', '');
    setCell('pct_'   + idx, '—', '');
    setGradeBadge(idx, '—', 'badge-muted');
    return;
  }

  var pct       = Math.round((total / maxPossible) * 100);
  var gradeInfo = resolveGradeClient(pct);
  var pctColor  = pct >= 75 ? 'color:var(--green);' : pct >= 50 ? 'color:var(--orange);' : 'color:var(--red);';

  setCell('total_' + idx, total, 'font-weight:800; color:#fff;');
  setCell('pct_'   + idx, pct + '%', pctColor);
  setGradeBadge(idx, gradeInfo.grade, gradeInfo.badgeClass);
}

function setCell(id, val, style) {
  var el = document.getElementById(id);
  if (el) { el.textContent = val; el.style.cssText = style || ''; }
}

function setGradeBadge(idx, grade, badgeClass) {
  var el = document.getElementById('gradebadge_' + idx);
  if (el) { el.textContent = grade; el.className = 'badge ' + (badgeClass || 'badge-muted'); }
}

function resolveGradeClient(pct) {
  var boundaries = _config ? _config.gradeBoundaries : [];
  if (!boundaries || !boundaries.length) {
    boundaries = [
      { grade:'A1', minScore:75, maxScore:100 }, { grade:'B2', minScore:70, maxScore:74 },
      { grade:'B3', minScore:65, maxScore:69  }, { grade:'C4', minScore:60, maxScore:64 },
      { grade:'C5', minScore:55, maxScore:59  }, { grade:'C6', minScore:50, maxScore:54 },
      { grade:'D7', minScore:45, maxScore:49  }, { grade:'E8', minScore:40, maxScore:44 },
      { grade:'F9', minScore:0,  maxScore:39  }
    ];
  }
  for (var i = 0; i < boundaries.length; i++) {
    var b = boundaries[i];
    if (pct >= b.minScore && pct <= b.maxScore) {
      var badgeClass = pct >= 75 ? 'badge-green' : pct >= 50 ? 'badge-orange' : 'badge-red';
      return { grade: b.grade, badgeClass: badgeClass };
    }
  }
  return { grade: '—', badgeClass: 'badge-muted' };
}

/* ============================================ SAVE & RANK */
async function saveAndRank(classId, subjectId, termId) {
  var btn      = document.getElementById('saveRankBtn');
  var resultEl = document.getElementById('resultSummary');
  var errorEl  = document.getElementById('errorSummary');

  if (resultEl) { resultEl.style.display = 'none'; }
  if (errorEl)  { errorEl.style.display  = 'none'; }

  var overMax = document.querySelectorAll('.score-input.over-max');
  if (overMax.length > 0) {
    if (errorEl) {
      errorEl.textContent = '⚠️ ' + overMax.length + ' input' + (overMax.length !== 1 ? 's' : '') + ' exceed the maximum allowed marks. Please correct them before saving.';
      errorEl.style.display = 'block';
    }
    return;
  }

  if (btn) { btn.innerHTML = '<span class="spinner"></span> Saving...'; btn.disabled = true; }

  var components = (_config ? _config.components : []).slice().sort(function (a,b) { return (a.sortOrder||0)-(b.sortOrder||0); });
  var entries = _roster.map(function (row, idx) {
    var scores = {};
    components.forEach(function (comp) {
      var input = document.querySelector('[data-idx="' + idx + '"][data-key="' + comp.key + '"]');
      scores[comp.key] = input && input.value !== '' ? parseFloat(input.value) : 0;
    });
    return { studentId: row.studentId, scores: scores };
  });

  var saveRes = await instApi('/score/bulk', 'POST', {
    classId:      classId,
    subjectId:    subjectId,
    termId:       termId,
    academicYear: _academicYear,
    entries:      entries
  });

  if (!saveRes.ok) {
    if (btn) { btn.innerHTML = '💾 Save &amp; Rank'; btn.disabled = false; }
    if (errorEl) {
      errorEl.textContent = '❌ ' + ((saveRes.data && saveRes.data.message) || 'Save failed.');
      if (saveRes.data && saveRes.data.code === 'SCORES_LOCKED') {
        errorEl.textContent = '🔒 These scores are approved and locked. Contact your school admin.';
      }
      errorEl.style.display = 'block';
    }
    return;
  }

  if (btn) { btn.innerHTML = '<span class="spinner"></span> Ranking...'; }

  var rankRes = await instApi('/score/rank/' + classId + '/' + subjectId + '/' + termId, 'POST');

  if (btn) { btn.innerHTML = '💾 Save &amp; Rank'; btn.disabled = false; }

  if (rankRes.ok && rankRes.data.summary) {
    rankRes.data.summary.forEach(function (s) {
      var rowIdx = _roster.findIndex(function (r) { return r.studentId.toString() === s.studentId.toString(); });
      if (rowIdx !== -1) {
        var posEl = document.getElementById('pos_' + rowIdx);
        if (posEl) { posEl.textContent = s.position + ' / ' + s.outOf; }
      }
    });
  }

  var saved  = saveRes.data.saved  || 0;
  var failed = saveRes.data.failed || 0;
  var ranked = rankRes.ok ? (rankRes.data.ranked || 0) : 0;

  if (resultEl) {
    resultEl.innerHTML = '✅ <strong>' + saved + ' score' + (saved !== 1 ? 's' : '') + ' saved</strong>' +
      (ranked ? ', <strong>' + ranked + ' student' + (ranked !== 1 ? 's' : '') + ' ranked</strong>' : '') +
      '. Ready to submit for approval.';
    resultEl.style.display = 'block';
  }

  if (failed > 0 && errorEl) {
    var errLines = (saveRes.data.errors || []).slice(0, 5).join('<br>');
    errorEl.innerHTML = '⚠️ ' + failed + ' row' + (failed !== 1 ? 's' : '') + ' could not be saved:<br>' + errLines;
    errorEl.style.display = 'block';
  }

  setTimeout(function () { loadRoster(); }, 800);
}

/* ============================================
   ✅ L.7: SUBMIT FOR APPROVAL
============================================ */
async function submitForApproval(classId, subjectId, termId) {
  var btn     = document.getElementById('submitApprovalBtn');
  var errorEl = document.getElementById('errorSummary');
  var resEl   = document.getElementById('resultSummary');

  if (errorEl) { errorEl.style.display = 'none'; }
  if (resEl)   { resEl.style.display   = 'none'; }

  var isPending = _submission && _submission.status === 'pending';
  var confirmMsg = isPending
    ? 'Resubmit these scores for admin approval? This will reset the current pending submission.'
    : 'Submit these scores for admin approval? The admin will review and approve or reject them.';

  if (!confirm(confirmMsg)) { return; }

  if (btn) { btn.innerHTML = '<span class="spinner"></span> Submitting...'; btn.disabled = true; }

  var res = await instApi('/score/submit', 'POST', {
    classId:      classId,
    subjectId:    subjectId,
    termId:       termId,
    academicYear: _academicYear
  });

  if (btn) { btn.innerHTML = isPending ? '↻ Resubmit' : '📤 Submit for Approval'; btn.disabled = false; }

  if (res.ok) {
    _submission = res.data.submission;
    /* Reload to show updated status banner */
    setTimeout(function () { loadRoster(); }, 400);
  } else {
    if (errorEl) {
      errorEl.textContent = '❌ ' + ((res.data && res.data.message) || 'Submission failed.');
      errorEl.style.display = 'block';
    }
  }
}

/* ============================================ CLEAR ALL */
function clearAllScores() {
  if (!confirm('Clear all score inputs? Saved scores are not deleted until you Save & Rank again.')) { return; }
  document.querySelectorAll('.score-input').forEach(function (inp) {
    inp.value = '';
    inp.classList.remove('over-max');
  });
  var n = _roster.length;
  for (var i = 0; i < n; i++) {
    setCell('total_' + i, '—', '');
    setCell('pct_'   + i, '—', '');
    setGradeBadge(i, '—', 'badge-muted');
  }
}

function buildEmptyState() {
  var missing = [];
  if (_classes.length  === 0) { missing.push('classes'); }
  if (_subjects.length === 0) { missing.push('subjects'); }
  if (_terms.length    === 0) { missing.push('terms'); }
  return '<div class="card"><div class="card-body"><div class="empty">' +
    '<div class="empty-icon">🏗️</div>' +
    '<div class="empty-title">Academic structure not set up yet</div>' +
    '<div class="empty-sub">Your school needs <strong>' + missing.join(', ') + '</strong> before scores can be entered.<br/><br/>' +
    'Ask the <a href="/institution/school/dashboard.html">School Admin</a> to go to <strong>Academic Structure</strong> and add ' + missing.join(', ') + ' first.</div>' +
  '</div></div></div>';
}

function buildPromptState() {
  return '<div class="card"><div class="card-body"><div class="empty">' +
    '<div class="empty-icon">📊</div>' +
    '<div class="empty-title">Select class, subject and term above</div>' +
    '<div class="empty-sub">Then click <strong>Load Class Roster</strong> to begin entering scores.</div>' +
  '</div></div></div>';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
